name: my-portfoloi-app

env:
  APP_ENV: production
  APP_DEBUG: false
  LOG_CHANNEL: stack

php: "8.4"    # <- Change this from 8.2 to 8.4

build:
  - "composer install --no-dev --optimize-autoloader"

start:
  - "php artisan migrate --force"
  - "php artisan cache:clear"
  - "php artisan config:cache"
